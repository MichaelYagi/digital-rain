name: Sync to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'demo.html'
      - 'digital-rain.js'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout digital-rain repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install unit test dependencies
        run: cd tests && npm install

      - name: Run unit tests
        run: cd tests && node node_modules/vitest/vitest.mjs run digital-rain.test.js

      - name: Install browser test dependencies
        run: cd tests/browser && npm install

      - name: Install Playwright browsers
        run: cd tests/browser && npx playwright install --with-deps chromium firefox

      - name: Run integration tests
        run: cd tests/browser && npx playwright test

      - name: Checkout michaelyagi.github.io repo
        uses: actions/checkout@v5
        with:
          repository: MichaelYagi/michaelyagi.github.io
          token: ${{ secrets.PAGES_SYNC_TOKEN }}
          path: pages-repo

      - name: Copy files to /digital-rain folder
        run: |
          mkdir -p pages-repo/digital-rain
          cp demo.html pages-repo/digital-rain/demo.html
          cp digital-rain.js pages-repo/digital-rain/digital-rain.js

      - name: Commit and push if changed
        run: |
          cd pages-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digital-rain/demo.html digital-rain/digital-rain.js
          git diff --cached --quiet || git commit -m "Sync digital-rain files from digital-rain repo"
          git push