name: Sync to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'demo.html'
      - 'digital-rain.js'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout digital-rain repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install canvas system dependencies
        run: sudo apt-get update && sudo apt-get install -y --fix-missing libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install test dependencies
        run: cd tests && npm install

      - name: Run tests
        run: cd tests && node node_modules/vitest/vitest.mjs run

      - name: Checkout michaelyagi.github.io repo
        uses: actions/checkout@v5
        with:
          repository: MichaelYagi/michaelyagi.github.io
          token: ${{ secrets.PAGES_SYNC_TOKEN }}
          path: pages-repo

      - name: Copy files to /digital-rain folder
        run: |
          mkdir -p pages-repo/digital-rain
          cp demo.html pages-repo/digital-rain/demo.html
          cp digital-rain.js pages-repo/digital-rain/digital-rain.js

      - name: Commit and push if changed
        run: |
          cd pages-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digital-rain/demo.html digital-rain/digital-rain.js
          git diff --cached --quiet || git commit -m "Sync digital-rain files from digital-rain repo"
          git push